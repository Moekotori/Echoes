<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECHO</title>
    <style>
      /* Boot splash — replaced as soon as React mounts into #root.
         Without this, first-launch-after-install shows a white window for the
         several seconds it takes Windows Defender to scan the freshly written
         executables and for the renderer bundle (kuroshiro / essentia.js /
         i18next, etc.) to parse. The user thinks it's hung. */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111114;
        color: #e8e8ec;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
      }
      #root {
        height: 100%;
      }
      .echo-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #111114;
        -webkit-app-region: drag;
        user-select: none;
      }
      .echo-boot__mark {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: #f5f5f7;
        opacity: 0.9;
      }
      .echo-boot__dots {
        display: flex;
        gap: 8px;
      }
      .echo-boot__dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #8a8a93;
        animation: echoBootPulse 1.2s ease-in-out infinite;
      }
      .echo-boot__dots span:nth-child(2) { animation-delay: 0.15s; }
      .echo-boot__dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes echoBootPulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="echo-boot" aria-hidden="true">
        <div class="echo-boot__mark">ECHO</div>
        <div class="echo-boot__dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script>
      // Floating windows (?mode=lyrics-desktop / ?mode=mini-player) use a
      // transparent BrowserWindow background; the dark splash above would flash
      // for a frame on those windows. Strip the splash + force transparent body
      // before first paint when we're in a floating-window mode.
      (function () {
        try {
          var mode = new URLSearchParams(window.location.search).get('mode')
          if (mode === 'lyrics-desktop' || mode === 'mini-player') {
            var boot = document.querySelector('.echo-boot')
            if (boot && boot.parentNode) boot.parentNode.removeChild(boot)
            document.documentElement.style.background = 'transparent'
            document.body.style.background = 'transparent'
          }
        } catch (_) { /* noop */ }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
